<!DOCTYPE html>
<html>
<head>
    <title>Buy Tickets</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: black; font-family: sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; }
        #ticket-btn { padding: 20px 40px; font-size: 24px; font-weight: bold; color: white; background-color: #e50914; border: none; border-radius: 50px; cursor: pointer; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="ticket-btn" onclick="launch()">CLICK TO BUY TICKETS!</button>
    </div>

    <video id="myVid" loop>
        <source src="Rick Astley - Never Gonna Give You Up (Official Video) (4K Remaster).mp4" type="video/mp4">
    </video>

    <audio id="myAud" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        function launch() {
            document.getElementById('overlay').style.display = 'none';
            var v = document.getElementById('myVid');
            var a = document.getElementById('myAud');
            v.style.display = 'block';
            v.play();
            a.play();
        }
    </script>
</body>
</html>
