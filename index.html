<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 800px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .media-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        img { width: 100%; height: auto; border-radius: 4px; display: block; margin: 0 auto; }
        iframe { width: 100%; border: none; border-radius: 4px; margin-top: 10px; }
        h2 { color: #333; margin-top: 0; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="media-box">
        <h2>Important Announcement</h2>
        <img src="images.jpg" alt="Scamilton Image">
    </div>

    <div class="media-box">
        <h2>Related Video</h2>
        <iframe height="450px" 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
            title="YouTube video player" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>
</div>

</body>
</html>
