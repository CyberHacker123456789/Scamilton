<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 1000px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .media-box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        iframe { width: 100%; border: none; border-radius: 4px; }
        h2 { color: #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="media-box">
        <h2>View Document</h2>
        <iframe src="doc.pdf" height="600px"></iframe>
    </div>

    <div class="media-box">
        <h2>Watch Video</h2>
        <iframe height="500px" 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
            title="YouTube video player" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>
</div>

</body>
</html>
